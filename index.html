<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0a1628"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>INNOVA STC v2</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<!-- Firebase v9 compat -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
/* ═══════════════════════════════════════════════
   TOKENS DE DISEÑO
═══════════════════════════════════════════════ */
:root {
  --bg-deep:   #070c12;
  --bg-base:   #0a1628;
  --bg-mid:    #0d2137;
  --glass:     rgba(255,255,255,.06);
  --glass-hov: rgba(255,255,255,.09);
  --border:    rgba(255,255,255,.08);
  --border-md: rgba(255,255,255,.12);
  --text:      #ffffff;
  --text-2:    rgba(255,255,255,.6);
  --text-3:    rgba(255,255,255,.35);
  --text-4:    rgba(255,255,255,.2);

  /* Cambios (CM) */
  --cm:        #0d9488;
  --cm-light:  #2dd4bf;
  --cm-glass:  rgba(13,148,136,.08);
  --cm-border: rgba(13,148,136,.22);

  /* OTC */
  --otc:       #2563eb;
  --otc-light: #60a5fa;
  --otc-glass: rgba(37,99,235,.08);
  --otc-border:rgba(37,99,235,.22);

  /* Caracterización (rojo) */
  --cr:        #dc2626;
  --cr-light:  #ef4444;
  --cr-glass:  rgba(239,68,68,.08);
  --cr-border: rgba(239,68,68,.22);

  /* Reclamos SIGET (amarillo) */
  --rc:        #d97706;
  --rc-light:  #fbbf24;
  --rc-glass:  rgba(251,191,36,.08);
  --rc-border: rgba(251,191,36,.22);

  /* Estados */
  --warn:  #f59e0b;
  --crit:  #ef4444;
  --ok:    #22c55e;

  --radius-sm:  10px;
  --radius:     14px;
  --radius-lg:  20px;
}

/* ═══════════════════════════════════════════════
   RESET + BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'Outfit', sans-serif;
  background: var(--bg-base);
  color: var(--text);
  overscroll-behavior: none;
}

/* ═══════════════════════════════════════════════
   FONDO ANIMADO
═══════════════════════════════════════════════ */
#bg {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse 120% 60% at 50% -10%, rgba(13,148,136,.12) 0%, transparent 60%),
              radial-gradient(ellipse 80% 50% at 90% 100%, rgba(37,99,235,.08) 0%, transparent 60%),
              linear-gradient(180deg, #070c12 0%, #0a1628 50%, #0d2137 100%);
}
#bg::after {
  content:'';
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* ═══════════════════════════════════════════════
   CAPA DE VISTAS
═══════════════════════════════════════════════ */
#app { position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; }

.view {
  position:absolute; inset:0;
  display:none; flex-direction:column;
  overflow:hidden;
}
.view.active { display:flex; }

/* ═══════════════════════════════════════════════
   ANIMACIONES
═══════════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}
@keyframes pulse-ring {
  0%   { transform:scale(1);   opacity:.6; }
  100% { transform:scale(1.5); opacity:0; }
}
@keyframes spin {
  to { transform:rotate(360deg); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}

.anim-up  { animation: fadeUp  .4s cubic-bezier(.16,1,.3,1) both; }
.anim-in  { animation: fadeIn  .3s ease both; }
.d1 { animation-delay:.05s; }
.d2 { animation-delay:.1s; }
.d3 { animation-delay:.15s; }
.d4 { animation-delay:.2s; }
.d5 { animation-delay:.25s; }

/* ═══════════════════════════════════════════════
   ▌ PANTALLA LOGIN
═══════════════════════════════════════════════ */
#view-login {
  align-items:center;
  justify-content:center;
  padding: 24px 20px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
}

.login-logo {
  margin-bottom: 36px;
  text-align: center;
  animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both;
}
.login-logo-mark {
  width: 64px; height: 64px;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--cm), var(--otc));
  display: flex; align-items:center; justify-content:center;
  margin: 0 auto 14px;
  box-shadow: 0 0 0 0 rgba(13,148,136,.4);
  position:relative;
}
.login-logo-mark::before {
  content:'';
  position:absolute; inset:-6px;
  border-radius:24px;
  border: 1px solid rgba(13,148,136,.2);
  animation: pulse-ring 2.5s ease-out infinite;
}
.login-logo-mark svg { width:30px; height:30px; }
.login-logo h1 { font-size:22px; font-weight:800; letter-spacing:-.02em; }
.login-logo p  { font-size:11px; font-weight:300; color:var(--text-3); margin-top:3px; letter-spacing:.06em; text-transform:uppercase; }

.login-card {
  width:100%; max-width:380px;
  background: rgba(255,255,255,.05);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  display:flex; flex-direction:column; gap:16px;
}

.login-field-label {
  font-size:10px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  color:var(--text-3); margin-bottom:7px;
}
.login-input-wrap { position:relative; }
.login-input {
  width:100%; height:52px;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color:var(--text);
  font-family:'Outfit', sans-serif;
  font-size:15px; font-weight:500;
  padding: 0 16px;
  outline:none;
  transition: border-color .2s, background .2s;
  -webkit-appearance:none;
}
.login-input:focus {
  border-color: var(--cm-light);
  background: rgba(45,212,191,.04);
}
.login-input::placeholder { color:var(--text-4); font-weight:300; }
.login-input.error { border-color:var(--crit); background:rgba(239,68,68,.05); }

/* PIN input */
.pin-row { display:flex; gap:8px; }
.pin-digit {
  flex:1; height:52px;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:700; color:var(--text);
  transition: border-color .15s, background .15s;
  position:relative; overflow:hidden; cursor:default;
}
.pin-digit.filled {
  border-color: var(--cm-light);
  background: rgba(45,212,191,.06);
}
.pin-digit.filled::after {
  content:'●';
  font-size:12px;
}
.pin-digit.active {
  border-color: var(--cm-light);
  box-shadow: 0 0 0 2px rgba(45,212,191,.15);
}
.pin-digit.error { border-color:var(--crit); animation: shake .3s ease; }

@keyframes shake {
  0%,100% { transform:translateX(0); }
  25%      { transform:translateX(-5px); }
  75%      { transform:translateX(5px); }
}

/* Teclado numérico */
.numpad {
  display:grid; grid-template-columns: repeat(3,1fr); gap:8px;
  margin-top:4px;
}
.numpad-key {
  height:54px;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:600; color:var(--text);
  cursor:pointer; user-select:none;
  transition: background .12s, transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.numpad-key:active { background:rgba(255,255,255,.12); transform:scale(.95); }
.numpad-key.del  { font-size:16px; color:var(--text-3); }
.numpad-key.empty { pointer-events:none; background:transparent; border:none; }

.btn-login {
  width:100%; height:52px;
  background: transparent;
  border: 1.5px solid var(--cm-light);
  border-radius: var(--radius-sm);
  color: var(--cm-light);
  font-family:'Outfit', sans-serif;
  font-size:14px; font-weight:700; letter-spacing:.04em;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition: background .2s, color .2s;
  -webkit-tap-highlight-color:transparent;
}
.btn-login:hover { background: rgba(45,212,191,.1); }
.btn-login:active { background: rgba(45,212,191,.18); }
.btn-login:disabled { opacity:.4; cursor:not-allowed; }
.btn-login .spinner {
  width:16px; height:16px;
  border:2px solid rgba(45,212,191,.3);
  border-top-color:var(--cm-light);
  border-radius:50%;
  animation:spin .7s linear infinite;
}

.login-error {
  text-align:center; font-size:12px; font-weight:500;
  color:var(--crit); background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.2);
  border-radius:8px; padding:10px 12px;
  display:none;
}
.login-error.show { display:block; animation:fadeIn .2s ease; }

/* ═══════════════════════════════════════════════
   ▌ PANTALLA PRINCIPAL (post-login)
═══════════════════════════════════════════════ */
#view-main {
  flex-direction:column;
  background: transparent;
}

/* Topbar */
.topbar {
  flex-shrink:0;
  padding: max(14px, env(safe-area-inset-top)) 16px 12px;
  display:flex; align-items:center; gap:12px;
  background:rgba(7,12,18,.6);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  position:relative; z-index:10;
}
.topbar-logo {
  width:34px; height:34px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--cm),var(--otc));
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.topbar-logo svg { width:16px; height:16px; }
.topbar-title { flex:1; }
.topbar-title h2 { font-size:15px; font-weight:700; letter-spacing:-.01em; }
.topbar-title p  { font-size:10px; font-weight:300; color:var(--text-3); margin-top:1px; }
.topbar-actions { display:flex; gap:8px; }
.topbar-btn {
  width:36px; height:36px;
  border-radius:10px;
  background:var(--glass);
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--text-2);
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.topbar-btn:active { background:var(--glass-hov); }

/* Área de contenido */
.content-area {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding: 16px 16px max(80px, calc(64px + env(safe-area-inset-bottom)));
  overscroll-behavior-y: contain;
}
.content-area::-webkit-scrollbar { display:none; }

/* ═══════════════════════════════════════════════
   NAVBAR INFERIOR
═══════════════════════════════════════════════ */
.navbar {
  position:absolute; bottom:0; left:0; right:0;
  padding: 8px 8px max(8px, env(safe-area-inset-bottom));
  background:rgba(7,12,18,.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex; gap:4px;
  z-index:10;
}
.nav-item {
  flex:1;
  height:56px;
  border-radius:12px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px;
  cursor:pointer; color:var(--text-4);
  transition: color .2s, background .2s;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.nav-item svg { width:20px; height:20px; stroke-width:1.8; }
.nav-item span { font-size:9px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
.nav-item.active { color:var(--cm-light); background:rgba(45,212,191,.06); }
.nav-item.active.otc { color:var(--otc-light); background:rgba(96,165,250,.06); }
.nav-item.active.cr { color:var(--cr-light); background:rgba(239,68,68,.06); }
.nav-item.active.rc { color:var(--rc-light); background:rgba(251,191,36,.06); }
.nav-item .nav-badge {
  position:absolute; top:8px; right:calc(50% - 14px);
  min-width:16px; height:16px; border-radius:8px;
  background:var(--crit); color:#fff;
  font-size:9px; font-weight:700; padding:0 4px;
  display:flex; align-items:center; justify-content:center;
}

/* ═══════════════════════════════════════════════
   ▌ SECCIÓN: SIN ASIGNACIÓN
═══════════════════════════════════════════════ */
.no-assign {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:32px 24px;
  gap:16px;
}
.no-assign-icon {
  width:72px; height:72px;
  border-radius:20px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  color:var(--text-4);
}
.no-assign-icon svg { width:32px; height:32px; }
.no-assign h3 { font-size:18px; font-weight:700; color:var(--text-2); }
.no-assign p  { font-size:13px; font-weight:300; color:var(--text-3); line-height:1.6; max-width:260px; }
.no-assign-name {
  font-size:11px; font-weight:600; letter-spacing:.08em;
  text-transform:uppercase; color:var(--text-4);
  background:var(--glass); border:1px solid var(--border);
  border-radius:8px; padding:8px 16px;
}

/* ═══════════════════════════════════════════════
   ▌ CHIP DE ROL
═══════════════════════════════════════════════ */
.role-chip {
  display:inline-flex; align-items:center; gap:5px;
  border-radius:20px; padding:4px 10px 4px 6px;
  font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
}
.role-chip.madelyn   { background:rgba(255,255,255,.08); color:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.15); }
.role-chip.asistente { background:rgba(255,255,255,.06); color:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.1); }
.role-chip.cm        { background:var(--cm-glass);  color:var(--cm-light); border:1px solid var(--cm-border); }
.role-chip.otc       { background:var(--otc-glass); color:var(--otc-light); border:1px solid var(--otc-border); }
.role-chip .dot { width:6px; height:6px; border-radius:50%; }
.role-chip.cm  .dot { background:var(--cm-light); }
.role-chip.otc .dot { background:var(--otc-light); }
.role-chip.madelyn   .dot { background:rgba(255,255,255,.6); }
.role-chip.asistente .dot { background:rgba(255,255,255,.4); }

/* ═══════════════════════════════════════════════
   ▌ PLACEHOLDERS DE MÓDULOS (Fase 1)
═══════════════════════════════════════════════ */
.placeholder-section {
  display:flex; flex-direction:column; gap:12px;
}

.section-label {
  font-size:9px; font-weight:700; letter-spacing:.15em;
  text-transform:uppercase; color:var(--text-4);
  padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,.05);
}

/* Card de bienvenida */
.welcome-card {
  border-radius:var(--radius);
  border:1px solid;
  padding:20px;
  position:relative; overflow:hidden;
}
.welcome-card.cm  { background:var(--cm-glass);  border-color:var(--cm-border); }
.welcome-card.otc { background:var(--otc-glass); border-color:var(--otc-border); }
.welcome-card.cr  { background:var(--cr-glass);  border-color:var(--cr-border); }
.welcome-card.rc  { background:var(--rc-glass);  border-color:var(--rc-border); }
.welcome-card.office { background:rgba(255,255,255,.04); border-color:var(--border); }
.welcome-card::before {
  content:'';
  position:absolute; top:-30px; right:-30px;
  width:100px; height:100px;
  border-radius:50%;
  background:currentColor; opacity:.04;
}
.welcome-area-label {
  font-size:9px; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; margin-bottom:6px; opacity:.6;
}
.welcome-name { font-size:22px; font-weight:800; letter-spacing:-.02em; margin-bottom:4px; }
.welcome-role { font-size:11px; font-weight:300; opacity:.6; }

/* Stat chips */
.stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.stat-chip {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 10px;
  text-align:center;
}
.stat-chip .val { font-size:22px; font-weight:800; letter-spacing:-.02em; }
.stat-chip .lbl { font-size:9px; font-weight:600; color:var(--text-3); letter-spacing:.06em; text-transform:uppercase; margin-top:2px; }
.stat-chip.cm-accent  { border-color:var(--cm-border);  background:var(--cm-glass); }
.stat-chip.otc-accent { border-color:var(--otc-border); background:var(--otc-glass); }
.stat-chip.cr-accent  { border-color:var(--cr-border);  background:var(--cr-glass); }
.stat-chip.rc-accent  { border-color:var(--rc-border);  background:var(--rc-glass); }
.stat-chip.cm-accent  .val { color:var(--cm-light); }
.stat-chip.otc-accent .val { color:var(--otc-light); }
.stat-chip.cr-accent  .val { color:var(--cr-light); }
.stat-chip.rc-accent  .val { color:var(--rc-light); }

/* Acceso rápido */
.quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.quick-card {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 14px;
  cursor:pointer;
  transition:background .15s, border-color .15s;
  display:flex; flex-direction:column; gap:8px;
  -webkit-tap-highlight-color:transparent;
}
.quick-card:active { background:var(--glass-hov); }
.quick-card .qc-icon {
  width:36px; height:36px;
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
}
.quick-card .qc-icon svg { width:18px; height:18px; }
.quick-card .qc-title { font-size:12px; font-weight:700; }
.quick-card .qc-sub   { font-size:10px; font-weight:300; color:var(--text-3); margin-top:-4px; }

/* Módulo en desarrollo */
.dev-module {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  text-align:center;
}
.dev-module p { font-size:12px; color:var(--text-3); font-weight:300; }
.dev-module .dev-title { font-size:14px; font-weight:700; color:var(--text-2); margin-bottom:4px; }

/* ═══════════════════════════════════════════════
   ▌ SHEET / MODAL (bottom sheet)
═══════════════════════════════════════════════ */
.sheet-backdrop {
  position:fixed; inset:0; z-index:50;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  display:none;
  align-items:flex-end;
  animation:fadeIn .2s ease;
}
.sheet-backdrop.open { display:flex; }
.sheet {
  width:100%;
  background: #0d1f35;
  border-radius:24px 24px 0 0;
  border:1px solid var(--border);
  border-bottom:none;
  padding:0;
  animation:slideUp .3s cubic-bezier(.16,1,.3,1) both;
  max-height:85vh;
  display:flex; flex-direction:column;
}
@keyframes slideUp {
  from { transform:translateY(100%); }
  to   { transform:translateY(0); }
}
.sheet-handle {
  width:36px; height:4px;
  background:rgba(255,255,255,.15);
  border-radius:2px;
  margin:12px auto 4px;
  flex-shrink:0;
}
.sheet-title {
  font-size:16px; font-weight:700;
  padding:8px 20px 16px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.sheet-body {
  overflow-y:auto; padding:16px 20px;
  padding-bottom:max(20px, env(safe-area-inset-bottom));
}

/* ═══════════════════════════════════════════════
   SPINNER PANTALLA COMPLETA
═══════════════════════════════════════════════ */
#splash {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
  background:#070c12;
  transition:opacity .4s ease;
}
#splash.hidden { opacity:0; pointer-events:none; }
.splash-logo {
  width:56px; height:56px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--cm),var(--otc));
  display:flex; align-items:center; justify-content:center;
}
.splash-logo svg { width:26px; height:26px; }
.splash-spinner {
  width:24px; height:24px;
  border:2px solid rgba(255,255,255,.1);
  border-top-color:var(--cm-light);

<!-- ═══════════════════════════════════════════════
     FIREBASE CONFIG + APP LOGIC
═══════════════════════════════════════════════ -->
<script>
// ─────────────────────────────────────────────
//  FIREBASE CONFIG — proyecto innova-950ff
// ─────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "REEMPLAZAR_API_KEY",
  authDomain:        "innova-950ff.firebaseapp.com",
  projectId:         "innova-950ff",
  storageBucket:     "innova-950ff.appspot.com",
  messagingSenderId: "REEMPLAZAR_SENDER_ID",
  appId:             "REEMPLAZAR_APP_ID"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

// ─────────────────────────────────────────────
//  ESTADO GLOBAL
// ─────────────────────────────────────────────
const App = {
  user: null,          // { uid, displayName, role, asignacion }
  currentTab: 'home',  // tab activo
  accentColor: null,   // 'cm' | 'otc' | 'office'
};

// ─────────────────────────────────────────────
//  UTILIDADES PIN (hash SHA-256 simple)
// ─────────────────────────────────────────────
async function hashPin(pin, salt) {
  const data = new TextEncoder().encode(salt + pin);
  const buf  = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Genera un salt aleatorio (usado al crear usuario)
function generateSalt() {
  return Array.from(crypto.getRandomValues(new Uint8Array(16)))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

// ─────────────────────────────────────────────
//  LÓGICA DE LOGIN
// ─────────────────────────────────────────────
let pinValue = '';

const pinDigits = document.querySelectorAll('.pin-digit');
const btnLogin  = document.getElementById('btn-login');
const inpUser   = document.getElementById('inp-user');
const errEl     = document.getElementById('login-error');

function updatePinDisplay() {
  pinDigits.forEach((el, i) => {
    el.classList.toggle('filled', i < pinValue.length);
    el.classList.toggle('active', i === pinValue.length);
    el.classList.remove('error');
  });
  checkLoginReady();
}

function checkLoginReady() {
  const userOk = inpUser.value.trim().length >= 2;
  const pinOk  = pinValue.length === 4;
  btnLogin.disabled = !(userOk && pinOk);
}

// Teclado numérico
document.querySelectorAll('.numpad-key[data-n]').forEach(key => {
  key.addEventListener('click', () => {
    if (pinValue.length < 4) {
      pinValue += key.dataset.n;
      updatePinDisplay();
    }
  });
});
document.getElementById('pin-del').addEventListener('click', () => {
  if (pinValue.length > 0) {
    pinValue = pinValue.slice(0, -1);
    updatePinDisplay();
  }
});

inpUser.addEventListener('input', checkLoginReady);

// Borrón de error al escribir
inpUser.addEventListener('input', () => {
  errEl.classList.remove('show');
  inpUser.classList.remove('error');
});

function showLoginError(msg = 'Usuario o PIN incorrecto') {
  errEl.textContent = msg;
  errEl.classList.add('show');
  inpUser.classList.add('error');
  pinDigits.forEach(d => d.classList.add('error'));
  pinValue = '';
  setTimeout(updatePinDisplay, 300);
}

btnLogin.addEventListener('click', doLogin);

async function doLogin() {
  const username = inpUser.value.trim().toLowerCase();
  if (!username || pinValue.length !== 4) return;

  // Estado cargando
  const btnText = document.getElementById('btn-login-text');
  btnLogin.disabled = true;
  btnLogin.innerHTML = '<div class="spinner"></div>';

  try {
    // Buscar usuario en Firestore
    const snap = await db.collection('users')
      .where('username', '==', username)
      .where('active', '==', true)
      .limit(1)
      .get();

    if (snap.empty) {
      showLoginError('Usuario no encontrado o desactivado');
      resetLoginBtn();
      return;
    }

    const doc  = snap.docs[0];
    const data = doc.data();

    // Verificar PIN
    const hash = await hashPin(pinValue, data.pinSalt || '');
    if (hash !== data.pinHash) {
      showLoginError('PIN incorrecto');
      resetLoginBtn();
      return;
    }

    // ¡Acceso concedido!
    App.user = {
      uid:         doc.id,
      username:    data.username,
      displayName: data.displayName,
      role:        data.role,          // 'madelyn' | 'asistente' | 'tecnico'
      asignacion:  data.asignacion || { area: null, pareja: null },
    };

    // Guardar sesión
    sessionStorage.setItem('stc_session', JSON.stringify(App.user));

    enterApp();

  } catch (err) {
    console.error('Login error:', err);
    showLoginError('Error de conexión. Verifica tu internet.');
    resetLoginBtn();
  }
}

function resetLoginBtn() {
  btnLogin.innerHTML = '<span id="btn-login-text">Ingresar</span>';
  btnLogin.disabled  = false;
  pinValue = '';
  updatePinDisplay();
}

// ─────────────────────────────────────────────
//  NAVEGACIÓN / ROUTING
// ─────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function enterApp() {
  showView('view-main');
  setupMainView();
}

function setupMainView() {
  const u = App.user;
  const role = u.role;
  const area = u.asignacion?.area; // 'OTC' | 'CM' | null

  // Determinar acento de color
  if (role === 'tecnico') {
    App.accentColor = area === 'CM'  ? 'cm'

    App.accentColor = 'office';

  // Topbar
  document.getElementById('topbar-name').textContent = u.displayName;
  document.getElementById('topbar-sub').textContent  = getRolLabel(role, area);

  // Botón actualizar solo para Madelyn

function getRolLabel(role, area) {
  if (role === 'madelyn')   return 'Coordinadora · Vista ejecutiva';

    if (!area) return 'Técnico · Sin asignación hoy';
    return `Técnico · Área ${area}`;

  return 'INNOVA STC v2';
}

// ─────────────────────────────────────────────
//  LOGOUT
// ─────────────────────────────────────────────
document.getElementById('btn-logout').addEventListener('click', () => {
  if (!confirm('¿Cerrar sesión?')) return;
  App.user = null;
  sessionStorage.removeItem('stc_session');
  pinValue = '';
  inpUser.value = '';
  inpUser.classList.remove('error');
  errEl.classList.remove('show');
  updatePinDisplay();
  checkLoginReady();
  showView('view-login');
});

// Botón actualizar (Madelyn)
document.getElementById('btn-refresh').addEventListener('click', () => {
  // TODO: Fase 2 — refrescar datos del dashboard
  const btn = document.getElementById('btn-refresh');
  btn.querySelector('svg').style.animation = 'spin .7s linear infinite';
  setTimeout(() => {
    btn.querySelector('svg').style.animation = '';
    renderTab(App.currentTab);
  }, 800);
});

// ─────────────────────────────────────────────
//  PERSISTENCIA DE SESIÓN
// ─────────────────────────────────────────────
function restoreSession() {
  try {
    const saved = sessionStorage.getItem('stc_session');
    if (saved) {
      App.user = JSON.parse(saved);
      return true;
    }
  } catch(e) {}
  return false;
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updatePinDisplay();

  // Intentar restaurar sesión
  setTimeout(() => {
    const splash = document.getElementById('splash');
    if (restoreSession() && App.user) {
      enterApp();
    } else {
      showView('view-login');
    }
    splash.classList.add('hidden');
    setTimeout(() => splash.remove(), 500);
  }, 800);
});
</script>
