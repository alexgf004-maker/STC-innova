<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0a1628"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>INNOVA STC · Acceso</title>
<link rel="stylesheet" href="css/styles.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

<div id="bg"></div>

<div id="login-wrapper">

  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <h1>INNOVA STC</h1>
    <p>Servicios Técnicos y Comerciales</p>
  </div>

  <!-- Card de login -->
  <div class="login-card">

    <!-- Campo usuario -->
    <div class="login-field anim-up d1">
      <div class="login-field-label">Usuario</div>
      <input id="inp-user" class="login-input" type="text"
             placeholder="Nombre de usuario"
             autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false"/>
      <label class="remember-label">
        <input type="checkbox" id="chk-remember"/>
        <span>Recordar usuario</span>
      </label>
    </div>

    <!-- Campo PIN -->
    <div class="login-field anim-up d2">
      <div class="login-field-label">PIN de acceso</div>
      <input id="inp-pin" class="login-input" type="password"
             inputmode="numeric" maxlength="8"
             placeholder="••••" autocomplete="off"/>
    </div>

    <!-- Error -->
    <div id="login-error" class="login-error anim-up d3"></div>

    <!-- Botón ingresar -->
    <button id="btn-login" class="btn-login anim-up d3" disabled>
      <span id="btn-login-label">Ingresar</span>
    </button>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script type="module" src="js/auth.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/STC-innova/sw.js');
  }
</script>
</body>
</html>
